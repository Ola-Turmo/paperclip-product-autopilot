<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#F5F7FA"/>
  <rect x="48" y="48" width="1504" height="804" rx="34" fill="#FFFFFF" stroke="rgba(11,52,68,0.08)"/>
  <rect x="96" y="96" width="224" height="42" rx="21" fill="#E4F2F0"/>
  <text x="208" y="123" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#115E59">PAPERCLIP PLUGIN</text>
  <text x="96" y="228" font-family="Playfair Display, Georgia, serif" font-size="72" font-weight="700" fill="#0B3444">From product noise</text>
  <text x="96" y="308" font-family="Playfair Display, Georgia, serif" font-size="72" font-weight="700" fill="#0B3444">to safe shipping</text>
  <text x="96" y="380" font-family="Inter, Arial, sans-serif" font-size="30" fill="#3D5C69">Paperclip Product Autopilot turns raw signals into ranked work,</text>
  <text x="96" y="420" font-family="Inter, Arial, sans-serif" font-size="30" fill="#3D5C69">review decisions, and controlled delivery runs with visible guardrails.</text>
  <rect x="96" y="484" width="202" height="58" rx="16" fill="#115E59"/>
  <text x="197" y="520" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#FFFFFF">Evidence first</text>
  <rect x="316" y="484" width="214" height="58" rx="16" fill="#EAF4F9"/>
  <text x="423" y="520" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#0B3444">Human-in-loop</text>
  <rect x="548" y="484" width="190" height="58" rx="16" fill="#FFF1E5"/>
  <text x="643" y="520" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#9A4F13">Rollback ready</text>

  <rect x="884" y="122" width="572" height="624" rx="28" fill="#F5F7FA" stroke="rgba(11,52,68,0.08)"/>
  <text x="926" y="176" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#0B3444">Core Engine</text>

  <rect x="926" y="214" width="490" height="114" rx="22" fill="#FFFFFF" stroke="rgba(11,52,68,0.08)"/>
  <circle cx="970" cy="255" r="14" fill="#115E59"/>
  <text x="1002" y="245" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#0B3444">Research ingestion</text>
  <text x="1002" y="282" font-family="Inter, Arial, sans-serif" font-size="19" fill="#52707C">Normalize provenance, freshness, confidence, and source quality.</text>

  <rect x="926" y="350" width="236" height="156" rx="22" fill="#EAF4F9"/>
  <text x="956" y="396" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#0B3444">Ranking</text>
  <text x="956" y="434" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800" fill="#0B3444">Deterministic</text>
  <text x="956" y="470" font-family="Inter, Arial, sans-serif" font-size="18" fill="#52707C">Ideas are scored, deduplicated,</text>
  <text x="956" y="496" font-family="Inter, Arial, sans-serif" font-size="18" fill="#52707C">and explained before action.</text>

  <rect x="1180" y="350" width="236" height="156" rx="22" fill="#EEF7F1"/>
  <text x="1210" y="396" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#0B3444">Delivery</text>
  <text x="1210" y="434" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800" fill="#0B3444">Controlled</text>
  <text x="1210" y="470" font-family="Inter, Arial, sans-serif" font-size="18" fill="#52707C">Budgets, locks, health checks,</text>
  <text x="1210" y="496" font-family="Inter, Arial, sans-serif" font-size="18" fill="#52707C">pause, cancel, and rollback.</text>

  <rect x="926" y="528" width="490" height="176" rx="22" fill="#0B3444"/>
  <text x="960" y="580" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" fill="#FFFFFF">Operator plane</text>
  <text x="960" y="622" font-family="Inter, Arial, sans-serif" font-size="20" fill="#D8E6EA">Digest inbox • audit timeline • checkpoint policy • governance gates</text>
  <text x="960" y="660" font-family="Inter, Arial, sans-serif" font-size="20" fill="#D8E6EA">Built to move work forward without hiding risk.</text>
</svg>

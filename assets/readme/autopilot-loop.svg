<svg width="1400" height="620" viewBox="0 0 1400 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="620" rx="32" fill="#F5F7FA"/>
  <text x="78" y="88" font-family="Playfair Display, Georgia, serif" font-size="46" font-weight="700" fill="#0B3444">The core loop</text>
  <text x="78" y="130" font-family="Inter, Arial, sans-serif" font-size="22" fill="#52707C">Discover signal, score work, approve safely, then ship with controls.</text>

  <rect x="78" y="210" width="250" height="256" rx="26" fill="#FFFFFF" stroke="rgba(11,52,68,0.08)"/>
  <text x="110" y="266" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#115E59">1. Discover</text>
  <text x="110" y="316" font-family="Inter, Arial, sans-serif" font-size="19" fill="#52707C">Research findings, support pain,</text>
  <text x="110" y="344" font-family="Inter, Arial, sans-serif" font-size="19" fill="#52707C">incidents, market changes, and</text>
  <text x="110" y="372" font-family="Inter, Arial, sans-serif" font-size="19" fill="#52707C">operator context enter one queue.</text>

  <rect x="390" y="210" width="250" height="256" rx="26" fill="#FFFFFF" stroke="rgba(11,52,68,0.08)"/>
  <text x="422" y="266" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#0B3444">2. Score</text>
  <text x="422" y="316" font-family="Inter, Arial, sans-serif" font-size="19" fill="#52707C">Rank ideas deterministically,</text>
  <text x="422" y="344" font-family="Inter, Arial, sans-serif" font-size="19" fill="#52707C">remove duplicates, explain why,</text>
  <text x="422" y="372" font-family="Inter, Arial, sans-serif" font-size="19" fill="#52707C">and learn from past outcomes.</text>

  <rect x="702" y="210" width="250" height="256" rx="26" fill="#FFFFFF" stroke="rgba(11,52,68,0.08)"/>
  <text x="734" y="266" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#9A4F13">3. Approve</text>
  <text x="734" y="316" font-family="Inter, Arial, sans-serif" font-size="19" fill="#52707C">Swipes, digest urgency, checkpoint</text>
  <text x="734" y="344" font-family="Inter, Arial, sans-serif" font-size="19" fill="#52707C">rules, and governance notes keep</text>
  <text x="734" y="372" font-family="Inter, Arial, sans-serif" font-size="19" fill="#52707C">humans in the loop.</text>

  <rect x="1014" y="210" width="250" height="256" rx="26" fill="#FFFFFF" stroke="rgba(11,52,68,0.08)"/>
  <text x="1046" y="266" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#0E7490">4. Ship</text>
  <text x="1046" y="316" font-family="Inter, Arial, sans-serif" font-size="19" fill="#52707C">Planning artifacts, delivery runs,</text>
  <text x="1046" y="344" font-family="Inter, Arial, sans-serif" font-size="19" fill="#52707C">health checks, cancel, pause, and</text>
  <text x="1046" y="372" font-family="Inter, Arial, sans-serif" font-size="19" fill="#52707C">rollback keep execution honest.</text>

  <path d="M328 336H390" stroke="#115E59" stroke-width="8" stroke-linecap="round"/>
  <path d="M640 336H702" stroke="#115E59" stroke-width="8" stroke-linecap="round"/>
  <path d="M952 336H1014" stroke="#115E59" stroke-width="8" stroke-linecap="round"/>
  <path d="M375 320L391 336L375 352" stroke="#115E59" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M687 320L703 336L687 352" stroke="#115E59" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M999 320L1015 336L999 352" stroke="#115E59" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>

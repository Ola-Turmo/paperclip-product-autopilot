<svg width="1400" height="860" viewBox="0 0 1400 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="860" fill="#F5F7FA"/>
  <rect x="54" y="54" width="1292" height="752" rx="32" fill="#FFFFFF" stroke="rgba(11,52,68,0.08)"/>
  <text x="92" y="116" font-family="Playfair Display, Georgia, serif" font-size="42" font-weight="700" fill="#0B3444">The operator layer</text>
  <text x="92" y="156" font-family="Inter, Arial, sans-serif" font-size="22" fill="#52707C">The product is strongest where teams need speed and trust at the same time.</text>

  <rect x="92" y="206" width="370" height="224" rx="26" fill="#FFFFFF" stroke="rgba(11,52,68,0.08)"/>
  <text x="124" y="254" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#115E59">Digest inbox</text>
  <text x="124" y="298" font-family="Inter, Arial, sans-serif" font-size="19" fill="#52707C">Urgency, recurrence, and recommended actions</text>
  <text x="124" y="326" font-family="Inter, Arial, sans-serif" font-size="19" fill="#52707C">tell operators what matters now.</text>
  <rect x="124" y="350" width="292" height="42" rx="14" fill="#FFF1E5"/>
  <text x="144" y="376" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#9A4F13">Intervention required: investigate stuck run</text>

  <rect x="514" y="206" width="370" height="224" rx="26" fill="#FFFFFF" stroke="rgba(11,52,68,0.08)"/>
  <text x="546" y="254" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#0E7490">Run visibility</text>
  <text x="546" y="298" font-family="Inter, Arial, sans-serif" font-size="19" fill="#52707C">Budget, branch, checkpoint, health checks,</text>
  <text x="546" y="326" font-family="Inter, Arial, sans-serif" font-size="19" fill="#52707C">and rollback context are visible in one place.</text>
  <rect x="546" y="350" width="288" height="42" rx="14" fill="#EAF4F9"/>
  <text x="566" y="376" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0B3444">Checkpoint required before risky execution</text>

  <rect x="936" y="206" width="318" height="224" rx="26" fill="#FFFFFF" stroke="rgba(11,52,68,0.08)"/>
  <text x="968" y="254" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#0B3444">Governance</text>
  <text x="968" y="298" font-family="Inter, Arial, sans-serif" font-size="19" fill="#52707C">The system can move fast, but it still</text>
  <text x="968" y="326" font-family="Inter, Arial, sans-serif" font-size="19" fill="#52707C">asks for notes, checkpoints, and approval where it should.</text>

  <rect x="92" y="486" width="1162" height="266" rx="26" fill="#0B3444"/>
  <text x="128" y="544" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800" fill="#FFFFFF">What makes the core functionality credible today</text>
  <text x="128" y="594" font-family="Inter, Arial, sans-serif" font-size="22" fill="#D8E6EA">Research normalization • deterministic ideation • duplicate handling • checkpoints</text>
  <text x="128" y="630" font-family="Inter, Arial, sans-serif" font-size="22" fill="#D8E6EA">Budgets • health checks • cancellations • rollback policy • operator audit</text>
  <text x="128" y="676" font-family="Inter, Arial, sans-serif" font-size="20" fill="#D8E6EA">This is already a real control layer. The missing pieces are mainly live connectors and deeper end-to-end execution.</text>
</svg>

name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Plugin Smoke
        run: npm run smoke:plugin

      - name: Dev Server Smoke
        run: npm run smoke:devserver

      - name: Package Smoke Test
        run: |
          npm pack
          mkdir -p /tmp/autopilot-package-smoke
          cd /tmp/autopilot-package-smoke
          npm init -y
          npm install "${GITHUB_WORKSPACE}"/ola-turmo-paperclip-product-autopilot-0.1.0.tgz
